<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suhas Nanda Kollipara</title>
    <!-- Importing a rounded typography style based on theme images -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #000000;
            color: #ffffff;
            padding: 3rem 2rem;
            text-align: left;
        }

        .container {
            max-width: 600px;
            margin: 0;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            text-transform: none;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .item {
            font-size: 1.2rem;
            font-weight: 400;
            color: #cccccc;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }

        .item:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="name">Suhas Nanda Kollipara</div>
    
    <div class="items-list">
        <div class="item">refinite</div>
        <div class="item">shastra</div>
        <div class="item">be.glasses</div>
        <div class="item">the finite social</div>
    </div>
</div>

</body>
</html>
