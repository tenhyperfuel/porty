<script>
    const canvas = document.getElementById('ledCanvas');
    const ctx = canvas.getContext('2d');

    // Matrix grid layout dimensions
    const PIXEL_SIZE = 30; 
    const GAP = 10;        
    const RADIUS = 5;      
    const STEP = PIXEL_SIZE + GAP;

    // Handcrafted 3x5 Bit-Map Font Array Engine
    const FONT_3X5 = {
        'A': [0x2, 0x5, 0x7, 0x5, 0x5],
        'B': [0x6, 0x5, 0x6, 0x5, 0x6],
        'C': [0x3, 0x4, 0x4, 0x4, 0x3],
        'D': [0x6, 0x5, 0x5, 0x5, 0x6],
        'E': [0x7, 0x4, 0x6, 0x4, 0x7],
        'F': [0x7, 0x4, 0x6, 0x4, 0x4],
        'G': [0x3, 0x4, 0x5, 0x5, 0x3],
        'H': [0x5, 0x5, 0x7, 0x5, 0x5],
        'I': [0x7, 0x2, 0x2, 0x2, 0x7],
        'J': [0x1, 0x1, 0x1, 0x5, 0x2],
        'K': [0x5, 0x5, 0x6, 0x5, 0x5],
        'L': [0x4, 0x4, 0x4, 0x4, 0x7],
        'M': [0x5, 0x7, 0x5, 0x5, 0x5],
        'N': [0x5, 0x7, 0x5, 0x5, 0x5],
        'O': [0x2, 0x5, 0x5, 0x5, 0x2],
        'P': [0x6, 0x5, 0x6, 0x4, 0x4],
        'Q': [0x2, 0x5, 0x5, 0x6, 0x1],
        'R': [0x6, 0x5, 0x6, 0x5, 0x5],
        'S': [0x3, 0x4, 0x2, 0x1, 0x6],
        'T': [0x7, 0x2, 0x2, 0x2, 0x2],
        'U': [0x5, 0x5, 0x5, 0x5, 0x2],
        'V': [0x5, 0x5, 0x5, 0x2, 0x2],
        'W': [0x5, 0x5, 0x5, 0x7, 0x5],
        'X': [0x5, 0x5, 0x2, 0x5, 0x5],
        'Y': [0x5, 0x5, 0x2, 0x2, 0x2],
        'Z': [0x7, 0x1, 0x2, 0x4, 0x7],
        '.': [0x0, 0x0, 0x0, 0x0, 0x2],
        '*': [0x2, 0x7, 0x2, 0x7, 0x2],
        ' ': [0x0, 0x0, 0x0, 0x0, 0x0]
    };

    const message = " REFINITE * SHASTRA * BE.GLASSES * THE FINITE SOCIAL * ";
    
    const matrixRows = 5;  
    const charWidth = 3;   
    const charSpacing = 1; 
    
    let totalMatrixWidth = 0;
    for (let i = 0; i < message.length; i++) {
        totalMatrixWidth += charWidth + charSpacing;
    }

    const ledMatrixData = Array.from({ length: matrixRows }, () => Array(totalMatrixWidth).fill(0));

    let currentColOffset = 0;
    for (let i = 0; i < message.length; i++) {
        const char = message[i].toUpperCase();
        const matrixGlyph = FONT_3X5[char] || FONT_3X5[' '];

        for (let r = 0; r < matrixRows; r++) {
            const byteRow = matrixGlyph[r];
            for (let c = 0; c < charWidth; c++) {
                const targetBit = (byteRow >> (2 - c)) & 1;
                ledMatrixData[r][currentColOffset + c] = targetBit;
            }
        }
        currentColOffset += charWidth + charSpacing;
    }

    let scrollX = 0;
    let mouseInside = false;
    canvas.addEventListener('mouseenter',()=>mouseInside=true);
    canvas.addEventListener('mouseleave',()=>mouseInside=false);


    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawRoundedRect(ctx, x, y, size, radius, fillStyle) {
        ctx.fillStyle = fillStyle;
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + size - radius, y);
        ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
        ctx.lineTo(x + size, y + size - radius);
        ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
        ctx.lineTo(x + radius, y + size);
        ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
    }

    function renderLoop() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Always render exactly 5 rows on desktop.
        const displayRows = matrixRows;

        // Scale pixels to fit the available height while keeping the aspect ratio.
        const availableHeight = canvas.height * 0.9;
        const dynamicStep = availableHeight / displayRows;
        const dynamicGap = dynamicStep * 0.25;
        const dynamicPixel = dynamicStep - dynamicGap;
        const dynamicRadius = Math.min(6, dynamicPixel * 0.18);

        const displayCols = Math.ceil(canvas.width / dynamicStep) + 1;
        const startRow = 0;

        for (let r = 0; r < displayRows; r++) {
            for (let c = 0; c < displayCols; c++) {
                
                const virtualX = Math.floor(c + scrollX) % totalMatrixWidth;
                const virtualY = r - startRow;

                let isLit = false;

                if (virtualY >= 0 && virtualY < matrixRows && virtualX >= 0 && virtualX < totalMatrixWidth) {
                    if (ledMatrixData[virtualY][virtualX] === 1) {
                        isLit = true;
                    }
                }

                const drawX = c * dynamicStep + dynamicGap / 2;
                const drawY = r * dynamicStep + dynamicGap / 2;

                if (isLit) {
                    drawRoundedRect(ctx, drawX, drawY, dynamicPixel, dynamicRadius, mouseInside ? '#b04eff' : '#121216');
                    ctx.strokeStyle = '#b04eff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(drawX + 1, drawY + 1, dynamicPixel - 2, dynamicPixel - 2);
                } else {
                    drawRoundedRect(ctx, drawX, drawY, dynamicPixel, dynamicRadius, '#121216');
                }
            }
        }

        scrollX += 0.05; 
        if (scrollX >= totalMatrixWidth) {
            scrollX = 0;
        }

        requestAnimationFrame(renderLoop);
    }

    renderLoop();
</script>
